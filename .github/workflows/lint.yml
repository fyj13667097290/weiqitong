name: 小程序模板语法检查

on:
  push:
    branches: [master]
    paths:
      - 'templates/driving/code/**/*.vue'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 扫描WXML不兼容语法
        run: |
          echo "🔍 扫描 {{}} 中 < > 符号..."
          python3 -c "
import os, sys
bad = 0
for root, dirs, files in os.walk('templates'):
    for f in files:
        if f.endswith('.vue'):
            fp = os.path.join(root, f)
            for i, line in enumerate(open(fp, encoding='utf-8'), 1):
                import re
                if re.search(r'\{\{[^}]*[<>][^}]*\}\}', line):
                    if not bad: print()
                    print(f'❌ {fp}:{i}  {line.strip()[:80]}')
                    bad += 1
if bad:
    print()
    print('═'*50)
    print(f'⚠️  发现 {bad} 处 WXML 不兼容写法')
    print('   改用 computed 属性，详见 RULES.md')
    print('═'*50)
    sys.exit(1)
else:
    print('✅ 通过')
"

      - name: 数据库备份检查
        run: |
          echo "📦 检查备份脚本是否存在..."
          if [ -f "scripts/generate.js" ]; then
            echo "✅ 项目结构完整"
          else
            echo "⚠️  generate.js 丢失"
            exit 1
          fi
